<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作業完成度追蹤系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f6f3;--bg3:#f0efe9;
  --text:#1a1a1a;--text2:#5a5a5a;--text3:#9a9a9a;
  --border:#e0ddd6;--border2:#c8c4bb;
  --radius:8px;--radius-lg:12px;
  --class-colors-bg:#E6F1FB,#EAF3DE,#FAEEDA,#EEEDFE,#FAECE7,#E1F5EE;
  --class-colors-text:#185FA5,#3B6D11,#854F0B,#534AB7,#993C1D,#0F6E56;
  --class-colors-border:#85B7EB,#97C459,#EF9F27,#AFA9EC,#F0997B,#5DCAA5;
}
body{font-family:'Helvetica Neue',Arial,'PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.header h1{font-size:20px;font-weight:600}
.saved-msg{font-size:11px;color:#3B6D11;opacity:0;transition:opacity .3s}
.saved-msg.show{opacity:1}

/* 班級列 */
.class-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;padding:10px 14px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg)}
.class-bar-label{font-size:11px;color:var(--text3);white-space:nowrap;margin-right:2px}
.class-tabs{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.class-tab{padding:5px 14px;font-size:13px;cursor:pointer;border:0.5px solid var(--border2);border-radius:20px;background:var(--bg2);color:var(--text2);white-space:nowrap;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.class-tab:hover{border-color:var(--border2);filter:brightness(.96)}
.class-tab.active{font-weight:500;box-shadow:0 0 0 1px currentColor}
.class-del{font-size:10px;opacity:.45;cursor:pointer;line-height:1;padding:1px 2px;border-radius:2px;border:none;background:none;font-family:inherit}
.class-del:hover{opacity:1;background:rgba(0,0,0,.08)}
.class-add-btn{padding:5px 12px;font-size:13px;cursor:pointer;border:0.5px dashed var(--border2);border-radius:20px;background:none;color:var(--text3);font-family:inherit;white-space:nowrap}
.class-add-btn:hover{border-color:var(--border);color:var(--text2)}

/* 主功能分頁 */
.tab-bar{display:flex;gap:6px;margin-bottom:1.25rem}
.tab-btn{padding:7px 22px;font-size:13px;cursor:pointer;border:0.5px solid var(--border2);border-radius:20px;background:var(--bg);color:var(--text2);font-family:inherit;transition:all .15s}
.tab-btn:hover{background:var(--bg2)}
.tab-btn.active-track{background:#E6F1FB;color:#185FA5;border-color:#85B7EB;font-weight:500;box-shadow:0 0 0 1px #85B7EB}
.tab-btn.active-report{background:#EAF3DE;color:#3B6D11;border-color:#97C459;font-weight:500;box-shadow:0 0 0 1px #97C459}

/* 卡片 */
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem}

/* toolbar */
.toolbar{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:1.1rem}
.field-grp{display:flex;flex-direction:column;gap:3px}
.field-lbl{font-size:11px;color:var(--text3)}
input[type=date],input[type=text]{height:34px;padding:0 10px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:13px;background:var(--bg);color:var(--text);outline:none;font-family:inherit}
input[type=date]:focus,input[type=text]:focus{border-color:#85B7EB;box-shadow:0 0 0 3px rgba(26,79,160,.07)}
.btn{height:34px;padding:0 14px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:13px;background:var(--bg);color:var(--text);cursor:pointer;white-space:nowrap;font-family:inherit;transition:background .12s}
.btn:hover{background:var(--bg2)}
.btn.info{background:#E6F1FB;color:#185FA5;border-color:#85B7EB}
.btn.info:hover{background:#d4e8f8}
.btn.success{background:#EAF3DE;color:#3B6D11;border-color:#97C459}
.btn.success:hover{background:#d8ecbf}
.header{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem}
.btn.danger{background:#FCEBEB;color:#A32D2D;border-color:#F09595}
.btn.danger:hover{background:#f8d8d8}

/* legend */
.legend{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.leg-item{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--text2)}
.warn-hint{font-size:11px;color:#854F0B;background:#FAEEDA;border:0.5px solid #EF9F27;border-radius:4px;padding:2px 8px;margin-left:auto}

/* table */
.table-wrap{overflow-x:auto;border:0.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:1rem}
table{border-collapse:collapse;width:100%;min-width:400px}
th{background:var(--bg2);font-size:11px;font-weight:600;color:var(--text2);padding:8px 6px;text-align:center;border-bottom:0.5px solid var(--border);white-space:nowrap;letter-spacing:.02em}
th:first-child{text-align:left;padding-left:12px;min-width:130px}
td{padding:5px 5px;text-align:center;border-bottom:0.5px solid var(--border);font-size:12px;vertical-align:middle}
td:first-child{text-align:left;padding-left:8px}
tr:last-child td{border-bottom:none}
tr.punish-row{background:#FFF9F7}

/* status badges */
.sb{display:inline-block;padding:3px 7px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:0.5px solid transparent;user-select:none;min-width:44px;text-align:center;transition:opacity .1s}
.sb:hover{opacity:.78}
.s-none{background:var(--bg2);color:var(--text3);border-color:var(--border)}
.s-done{background:#EAF3DE;color:#3B6D11;border-color:#97C459}
.s-undone{background:#FCEBEB;color:#A32D2D;border-color:#F09595}
.s-nobring{background:#FAEEDA;color:#854F0B;border-color:#EF9F27}
.s-late{background:#E6F1FB;color:#185FA5;border-color:#85B7EB}
.s-makeup{background:#EEEDFE;color:#534AB7;border-color:#AFA9EC}

/* name edit */
.name-text{font-size:13px;font-weight:500;color:var(--text);cursor:pointer;border-bottom:1px dashed var(--border2)}
.name-text:hover{color:#185FA5;border-color:#85B7EB}
.name-input{font-size:13px;font-weight:500;height:28px;padding:0 6px;border:0.5px solid #85B7EB;border-radius:4px;background:var(--bg);color:var(--text);width:80px;outline:none;font-family:inherit}
.warn-badge{display:inline-block;background:#FCEBEB;color:#A32D2D;border:0.5px solid #F09595;border-radius:4px;font-size:10px;padding:1px 5px;margin-left:4px;vertical-align:middle}
.pdone-btn{display:inline-block;background:#EAF3DE;color:#3B6D11;border:0.5px solid #97C459;border-radius:4px;font-size:10px;padding:1px 6px;margin-left:3px;cursor:pointer;vertical-align:middle}
.pdone-btn:hover{background:#d5edbc}
.del-btn{font-size:12px;color:var(--text3);cursor:pointer;padding:3px 7px;border-radius:4px;border:0.5px solid transparent;background:none;font-family:inherit}
.del-btn:hover{color:#A32D2D;background:#FCEBEB;border-color:#F09595}

/* stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px}
.stat-card{background:var(--bg2);border-radius:var(--radius);padding:12px 14px}
.stat-lbl{font-size:11px;color:var(--text3);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:600;color:var(--text)}

/* phase label */
.phase-lbl{font-size:11px;color:var(--text3);margin-bottom:8px}

/* no data */
.no-data{font-size:13px;color:var(--text3);padding:3rem;text-align:center;line-height:2}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.38);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border2);padding:1.75rem;width:340px;max-width:92vw;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal h3{font-size:16px;font-weight:600;margin-bottom:.3rem}
.modal .msub{font-size:13px;color:var(--text2);margin-bottom:1.2rem;line-height:1.6}
.modal input{width:100%;height:36px;padding:0 10px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:13px;background:var(--bg);color:var(--text);margin-bottom:12px;font-family:inherit;outline:none}
.modal input:focus{border-color:#85B7EB}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}

/* report */
.report-block{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem}
.report-block h3{font-size:14px;font-weight:600;margin-bottom:1rem}
.stu-row{display:flex;align-items:center;gap:10px;font-size:12px;margin-bottom:6px}
.stu-name-r{width:75px;color:var(--text2);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.stu-nums{font-size:11px;color:var(--text3);white-space:nowrap;min-width:64px;text-align:right}

/* CLASS COLOR PALETTES — 6 colours cycling */
.cc0{background:#E6F1FB;color:#185FA5;border-color:#85B7EB}
.cc1{background:#EAF3DE;color:#3B6D11;border-color:#97C459}
.cc2{background:#FAEEDA;color:#854F0B;border-color:#EF9F27}
.cc3{background:#EEEDFE;color:#534AB7;border-color:#AFA9EC}
.cc4{background:#FAECE7;color:#993C1D;border-color:#F0997B}
.cc5{background:#E1F5EE;color:#0F6E56;border-color:#5DCAA5}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>📋 作業完成度追蹤</h1>
    <span class="saved-msg" id="saved-msg">已自動儲存</span>
    <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
      <button class="btn success" onclick="exportData()">⬇ 匯出備份</button>
      <button class="btn" onclick="document.getElementById('import-input').click()">⬆ 匯入資料</button>
      <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>

  <!-- 班級列 -->
  <div class="class-bar">
    <span class="class-bar-label">班級</span>
    <div class="class-tabs" id="class-tabs"></div>
    <button class="class-add-btn" onclick="openClassModal()">＋ 新增班級</button>
  </div>

  <!-- 主分頁 -->
  <div class="tab-bar">
    <button class="tab-btn" id="tbtn-track" onclick="showTab('track')">作業登記</button>
    <button class="tab-btn" id="tbtn-report" onclick="showTab('report')">總結報告</button>
  </div>

  <!-- 作業登記 -->
  <div id="tab-track">
    <div class="card">
      <div class="toolbar">
        <div class="field-grp">
          <span class="field-lbl">登記日期</span>
          <input type="date" id="date-input" style="width:150px">
        </div>
        <button class="btn info" onclick="addDate()">新增這天</button>
        <div style="flex:1"></div>
        <button class="btn" onclick="openAddStuModal()">＋ 新增學生</button>
        <button class="btn danger" onclick="endPhase()">結束本階段</button>
      </div>

      <div class="legend">
        <span class="leg-item"><span class="sb s-done">完成</span></span>
        <span class="leg-item"><span class="sb s-undone">未完成</span></span>
        <span class="leg-item"><span class="sb s-nobring">未帶</span></span>
        <span class="leg-item"><span class="sb s-late">遲交</span></span>
        <span class="leg-item"><span class="sb s-makeup">已補完</span></span>
        <span class="leg-item"><span class="sb s-none">—</span>未登記</span>
        <span class="warn-hint">⚠ 連續兩天未完成／未帶 → 須處罰</span>
      </div>

      <div id="phase-lbl" class="phase-lbl"></div>

      <div class="table-wrap">
        <div class="no-data" id="no-date-msg">尚未新增任何日期<br><span style="font-size:12px">選擇日期後點「新增這天」開始登記</span></div>
        <table id="main-table" style="display:none">
          <thead id="t-head"></thead>
          <tbody id="t-body"></tbody>
        </table>
      </div>

      <div class="stats-grid" id="stats-grid"></div>
    </div>
  </div>

  <!-- 總結報告 -->
  <div id="tab-report" style="display:none">
    <div id="report-content"></div>
  </div>
</div>

<!-- 新增班級 -->
<div id="modal-class" style="display:none">
  <div class="modal-overlay">
    <div class="modal">
      <h3>新增班級</h3>
      <p class="msub">輸入班級名稱，按 Enter 或點「新增」</p>
      <input type="text" id="class-name-input" placeholder="例：901班" maxlength="20">
      <div class="modal-btns">
        <button class="btn" onclick="closeClassModal()">取消</button>
        <button class="btn info" onclick="confirmAddClass()">新增</button>
      </div>
    </div>
  </div>
</div>

<!-- 新增學生 -->
<div id="modal-add-stu" style="display:none">
  <div class="modal-overlay">
    <div class="modal">
      <h3>新增學生</h3>
      <input type="text" id="new-name-input" placeholder="學生姓名" maxlength="20">
      <div class="modal-btns">
        <button class="btn" onclick="closeStuModal()">取消</button>
        <button class="btn info" onclick="confirmAddStu()">新增</button>
      </div>
    </div>
  </div>
</div>

<!-- 結束本階段 -->
<div id="modal-end" style="display:none">
  <div class="modal-overlay">
    <div class="modal">
      <h3>結束本階段</h3>
      <p class="msub">目前所有登記資料將封存為歷史記錄，並可在「總結報告」中查看。系統將重新開始新一輪的登記。</p>
      <div class="modal-btns">
        <button class="btn" onclick="closeEndModal()">取消</button>
        <button class="btn danger" onclick="confirmEnd()">確認結束</button>
      </div>
    </div>
  </div>
</div>

<script>
var STATUSES=['none','done','undone','nobring','late','makeup'];
var LABELS={none:'—',done:'完成',undone:'未完成',nobring:'未帶',late:'遲交',makeup:'已補完'};
var CLS={none:'s-none',done:'s-done',undone:'s-undone',nobring:'s-nobring',late:'s-late',makeup:'s-makeup'};
var CC=['cc0','cc1','cc2','cc3','cc4','cc5'];
var STORE='hw_tracker_v2';

var classes=[];
var currentId=null;
var editingStu=null;
var currentTab='track';

function save(){
  try{localStorage.setItem(STORE,JSON.stringify({classes:classes,currentId:currentId}));}catch(e){}
  var el=document.getElementById('saved-msg');
  el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(function(){el.classList.remove('show');},1800);
}

function load(){
  try{
    var raw=localStorage.getItem(STORE);
    if(raw){var d=JSON.parse(raw);classes=d.classes||[];currentId=d.currentId||null;}
  }catch(e){}
  if(classes.length===0){
    var c=mkClass('我的班級');classes=[c];currentId=c.id;
  }
  if(!classes.find(function(c){return c.id===currentId;})) currentId=classes[0].id;
}

function mkClass(name){
  return{id:'c'+Date.now()+Math.random().toString(36).slice(2,7),name:name,students:[],dates:[],records:{},punishCleared:{},phaseNum:1,history:[]};
}

function cls(){return classes.find(function(c){return c.id===currentId;})||null;}

function colorIdx(id){
  var i=classes.findIndex(function(c){return c.id===id;});
  return CC[i%CC.length];
}

/* ── 班級 ── */
function renderClassTabs(){
  var el=document.getElementById('class-tabs');
  var html='';
  classes.forEach(function(c){
    var cc=colorIdx(c.id);
    var active=c.id===currentId;
    var style=active?(' '+cc):'';
    html+='<button class="class-tab'+style+'" onclick="switchClass(\''+c.id+'\')">'
      +esc(c.name)
      +'<button class="class-del" onclick="event.stopPropagation();deleteClass(\''+c.id+'\')">✕</button>'
      +'</button>';
  });
  el.innerHTML=html;
}

function switchClass(id){currentId=id;editingStu=null;save();renderClassTabs();render();}

function openClassModal(){
  document.getElementById('modal-class').style.display='block';
  setTimeout(function(){document.getElementById('class-name-input').focus();},50);
}
function closeClassModal(){document.getElementById('modal-class').style.display='none';document.getElementById('class-name-input').value='';}
function confirmAddClass(){
  var name=document.getElementById('class-name-input').value.trim();
  if(!name)return;
  if(classes.find(function(c){return c.name===name;})){alert('班級名稱已存在');return;}
  var c=mkClass(name);classes.push(c);currentId=c.id;
  closeClassModal();save();renderClassTabs();render();
}
function deleteClass(id){
  var c=classes.find(function(x){return x.id===id;});
  if(!c)return;
  if(!confirm('確定刪除班級「'+c.name+'」及其所有資料？'))return;
  classes=classes.filter(function(x){return x.id!==id;});
  if(classes.length===0){var nc=mkClass('我的班級');classes=[nc];currentId=nc.id;}
  else if(currentId===id)currentId=classes[0].id;
  save();renderClassTabs();render();
}

/* ── 分頁 ── */
function showTab(t){
  currentTab=t;
  document.getElementById('tab-track').style.display=t==='track'?'block':'none';
  document.getElementById('tab-report').style.display=t==='report'?'block':'none';
  var bt=document.getElementById('tbtn-track');
  var br=document.getElementById('tbtn-report');
  bt.className='tab-btn'+(t==='track'?' active-track':'');
  br.className='tab-btn'+(t==='report'?' active-report':'');
  if(t==='report')renderReport();
}

/* ── 記錄 ── */
function rk(s,d){return s+'||'+d;}
function getSt(s,d){var c=cls();return c?(c.records[rk(s,d)]||'none'):'none';}
function setSt(s,d,v){var c=cls();if(c)c.records[rk(s,d)]=v;}
function isBad(v){return v==='undone'||v==='nobring';}

function getPunish(s){
  var c=cls();if(!c)return{punished:false};
  for(var i=1;i<c.dates.length;i++){
    if(isBad(getSt(s,c.dates[i-1]))&&isBad(getSt(s,c.dates[i]))){
      var ck=s+'||'+i;
      if(!c.punishCleared[ck])return{punished:true,ck:ck};
    }
  }
  return{punished:false};
}

function cycleSt(s,d){setSt(s,d,STATUSES[(STATUSES.indexOf(getSt(s,d))+1)%STATUSES.length]);save();render();}
function clearPunish(ck){var c=cls();if(c){c.punishCleared[ck]=true;save();render();}}

function delStu(name){
  var c=cls();if(!c)return;
  if(!confirm('確定刪除學生「'+name+'」？'))return;
  c.students=c.students.filter(function(s){return s!==name;});
  if(editingStu===name)editingStu=null;
  save();render();
}

function startEdit(name){editingStu=name;render();var i=document.getElementById('edit-inp');if(i){i.focus();i.select();}}
function commitEdit(){
  var inp=document.getElementById('edit-inp');
  if(!inp){editingStu=null;render();return;}
  var c=cls();if(!c){editingStu=null;render();return;}
  var old=editingStu,nw=inp.value.trim();editingStu=null;
  if(!nw||nw===old){render();return;}
  if(c.students.indexOf(nw)>=0){alert('姓名已存在');render();return;}
  c.students[c.students.indexOf(old)]=nw;
  var nr={},pc={};
  Object.keys(c.records).forEach(function(k){nr[k.startsWith(old+'||')?nw+'||'+k.slice(old.length+2):k]=c.records[k];});
  Object.keys(c.punishCleared).forEach(function(k){pc[k.startsWith(old+'||')?nw+'||'+k.slice(old.length+2):k]=true;});
  c.records=nr;c.punishCleared=pc;
  save();render();
}
function cancelEdit(){editingStu=null;render();}

function addDate(){
  var c=cls();if(!c){alert('請先選擇班級');return;}
  var v=document.getElementById('date-input').value;
  if(!v){alert('請先選擇日期');return;}
  if(c.dates.indexOf(v)>=0){alert('此日期已存在');return;}
  c.dates.push(v);c.dates.sort();save();render();
}

/* ── 主渲染 ── */
function render(){
  var c=cls();
  var table=document.getElementById('main-table');
  var msg=document.getElementById('no-date-msg');

  if(!c||c.dates.length===0){
    msg.style.display='block';
    msg.innerHTML=!c?'請先新增或選擇班級':'尚未新增任何日期<br><span style="font-size:12px">選擇日期後點「新增這天」</span>';
    table.style.display='none';
    document.getElementById('phase-lbl').textContent='';
    document.getElementById('stats-grid').innerHTML='';
    return;
  }
  msg.style.display='none';table.style.display='table';
  document.getElementById('phase-lbl').textContent='第 '+c.phaseNum+' 階段 · '+c.dates.length+' 個登記日';

  var hd='<tr><th style="text-align:left;padding-left:12px;min-width:130px">姓名</th>';
  c.dates.forEach(function(d){var p=d.split('-');hd+='<th>'+parseInt(p[1])+'/'+parseInt(p[2])+'</th>';});
  hd+='<th>完成率</th><th></th></tr>';
  document.getElementById('t-head').innerHTML=hd;

  var bd='';
  c.students.forEach(function(s){
    var info=getPunish(s);
    bd+='<tr'+(info.punished?' class="punish-row"':'')+'>';
    if(editingStu===s){
      bd+='<td><input class="name-input" id="edit-inp" value="'+escQ(s)+'" maxlength="20" onblur="commitEdit()" onkeydown="if(event.key===\'Enter\')commitEdit();else if(event.key===\'Escape\')cancelEdit();"></td>';
    } else {
      var bg='';
      if(info.punished)bg='<span class="warn-badge">⚠ 處罰</span><span class="pdone-btn" onclick="clearPunish(\''+escQ(info.ck)+'\')">處罰完成</span>';
      bd+='<td><span class="name-text" onclick="startEdit(\''+escQ(s)+'\')">'+esc(s)+'</span>'+bg+'</td>';
    }
    var done=0,logged=0;
    c.dates.forEach(function(d){
      var st=getSt(s,d);
      if(st!=='none'){logged++;if(st==='done'||st==='late'||st==='makeup')done++;}
      bd+='<td><span class="sb '+CLS[st]+'" onclick="cycleSt(\''+escQ(s)+'\',\''+d+'\')">'+LABELS[st]+'</span></td>';
    });
    var rate=logged>0?Math.round(done/logged*100):null;
    bd+='<td style="font-size:12px;font-weight:500;color:#5a5a5a">'+(rate!==null?rate+'%':'—')+'</td>';
    bd+='<td><button class="del-btn" onclick="delStu(\''+escQ(s)+'\')">✕</button></td></tr>';
  });
  document.getElementById('t-body').innerHTML=bd;
  var inp=document.getElementById('edit-inp');if(inp){inp.focus();inp.select();}
  renderStats();
}

function renderStats(){
  var grid=document.getElementById('stats-grid');
  var c=cls();
  if(!c||c.dates.length===0){grid.innerHTML='';return;}
  var tl=0,td=0,tp=0;
  c.students.forEach(function(s){
    if(getPunish(s).punished)tp++;
    c.dates.forEach(function(d){var st=getSt(s,d);if(st!=='none'){tl++;if(st==='done'||st==='late'||st==='makeup')td++;}});
  });
  var rate=tl>0?Math.round(td/tl*100):0;
  grid.innerHTML=
    '<div class="stat-card"><div class="stat-lbl">學生人數</div><div class="stat-val">'+c.students.length+'</div></div>'+
    '<div class="stat-card"><div class="stat-lbl">登記天數</div><div class="stat-val">'+c.dates.length+'</div></div>'+
    '<div class="stat-card"><div class="stat-lbl">整體完成率</div><div class="stat-val">'+rate+'%</div></div>'+
    '<div class="stat-card"><div class="stat-lbl">待處罰人數</div><div class="stat-val" style="color:'+(tp>0?'#A32D2D':'inherit')+'">'+tp+'</div></div>';
}

/* ── 學生 modal ── */
function openAddStuModal(){
  var c=cls();if(!c){alert('請先選擇班級');return;}
  document.getElementById('modal-add-stu').style.display='block';
  setTimeout(function(){document.getElementById('new-name-input').focus();},50);
}
function closeStuModal(){document.getElementById('modal-add-stu').style.display='none';document.getElementById('new-name-input').value='';}
function confirmAddStu(){
  var c=cls();if(!c)return;
  var name=document.getElementById('new-name-input').value.trim();
  if(!name)return;
  if(c.students.indexOf(name)>=0){alert('此姓名已存在');return;}
  c.students.push(name);closeStuModal();save();render();
}

/* ── 結束階段 ── */
function endPhase(){
  var c=cls();if(!c)return;
  if(c.dates.length===0){alert('尚未有任何登記資料');return;}
  document.getElementById('modal-end').style.display='block';
}
function closeEndModal(){document.getElementById('modal-end').style.display='none';}
function confirmEnd(){
  var c=cls();if(!c)return;
  c.history.push({phase:c.phaseNum,dates:c.dates.slice(),records:Object.assign({},c.records),students:c.students.slice(),punishCleared:Object.assign({},c.punishCleared)});
  c.phaseNum++;c.dates=[];c.records={};c.punishCleared={};
  closeEndModal();save();showTab('report');render();
}

/* ── 總結報告 ── */
function renderReport(){
  var el=document.getElementById('report-content');
  var c=cls();
  if(!c||c.history.length===0){
    el.innerHTML='<div class="no-data" style="padding:3rem">尚無已完成的階段記錄<br><span style="font-size:12px">點「結束本階段」後報告會顯示在這裡</span></div>';
    return;
  }
  var html='';
  c.history.slice().reverse().forEach(function(h){
    var tl=0,td=0,ps=[];
    var rows=h.students.map(function(s){
      var done=0,logged=0;
      h.dates.forEach(function(d){var st=h.records[s+'||'+d]||'none';if(st!=='none'){logged++;if(st==='done'||st==='late'||st==='makeup')done++;}});
      var punished=false;
      for(var i=1;i<h.dates.length;i++){
        if(isBad(h.records[s+'||'+h.dates[i-1]]||'none')&&isBad(h.records[s+'||'+h.dates[i]]||'none')){
          if(!h.punishCleared[s+'||'+i]){punished=true;break;}
        }
      }
      if(punished)ps.push(s);tl+=logged;td+=done;
      return{s:s,done:done,logged:logged,rate:logged>0?Math.round(done/logged*100):0,punished:punished};
    });
    var overall=tl>0?Math.round(td/tl*100):0;
    var fmt=function(d){var p=d.split('-');return parseInt(p[1])+'/'+parseInt(p[2]);};
    html+='<div class="report-block">';
    html+='<h3>第 '+h.phase+' 階段　<span style="font-size:12px;font-weight:400;color:#9a9a9a">'+fmt(h.dates[0])+' ～ '+fmt(h.dates[h.dates.length-1])+'，共 '+h.dates.length+' 天</span></h3>';
    html+='<div class="stats-grid" style="margin-bottom:1rem">'+
      '<div class="stat-card"><div class="stat-lbl">學生人數</div><div class="stat-val">'+h.students.length+'</div></div>'+
      '<div class="stat-card"><div class="stat-lbl">登記天數</div><div class="stat-val">'+h.dates.length+'</div></div>'+
      '<div class="stat-card"><div class="stat-lbl">整體完成率</div><div class="stat-val">'+overall+'%</div></div>'+
      '<div class="stat-card"><div class="stat-lbl">受罰人數</div><div class="stat-val" style="color:'+(ps.length>0?'#A32D2D':'inherit')+'">'+ps.length+'</div></div>'+
    '</div>';
    rows.sort(function(a,b){return a.rate-b.rate;}).forEach(function(r){
      var bc=r.rate>=80?'#5a9e2f':r.rate>=50?'#b07a10':'#c0362d';
      html+='<div class="stu-row"><span class="stu-name-r">'+esc(r.s)+(r.punished?'<span class="warn-badge" style="margin-left:3px">⚠</span>':'')+'</span><div class="bar-track"><div class="bar-fill" style="width:'+r.rate+'%;background:'+bc+'"></div></div><span class="stu-nums">'+r.done+'/'+r.logged+' · '+r.rate+'%</span></div>';
    });
    html+='</div>';
  });
  el.innerHTML=html;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escQ(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

/* ── 匯出 / 匯入 ── */
function exportData(){
  var data={version:2,exportedAt:new Date().toISOString(),classes:classes};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  var d=new Date();
  var fname='作業追蹤_'+d.getFullYear()+''+String(d.getMonth()+1).padStart(2,'0')+''+String(d.getDate()).padStart(2,'0')+'.json';
  a.href=url;a.download=fname;a.click();
  URL.revokeObjectURL(url);
}

function importData(e){
  var file=e.target.files[0];
  if(!file){return;}
  if(!confirm('匯入後將覆蓋目前所有資料，確定繼續？')){e.target.value='';return;}
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      if(!data.classes||!Array.isArray(data.classes))throw new Error('格式錯誤');
      classes=data.classes;
      currentId=classes.length>0?classes[0].id:null;
      save();renderClassTabs();showTab('track');render();
      alert('匯入成功！共 '+classes.length+' 個班級。');
    }catch(err){
      alert('匯入失敗：檔案格式不正確，請確認是從本系統匯出的備份檔。');
    }
    e.target.value='';
  };
  reader.readAsText(file,'UTF-8');
}

/* ── 初始化 ── */
document.getElementById('date-input').value=new Date().toISOString().slice(0,10);
document.getElementById('new-name-input').addEventListener('keydown',function(e){if(e.key==='Enter')confirmAddStu();});
document.getElementById('class-name-input').addEventListener('keydown',function(e){if(e.key==='Enter')confirmAddClass();});

load();
renderClassTabs();
showTab('track');
render();
</script>
